<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络会话监控 - Network Session Monitor</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                📊 网络会话监控
            </a>
            <span class="navbar-text text-muted">
                Network Session Monitor
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 统计卡片 -->
        <div class="row">
            <div class="col-md-4">
                <div class="card bg-primary text-white mb-4">
                    <div class="card-body">
                        <h5 class="card-title">监听端口</h5>
                        <h2 class="mb-0" id="total-ports">--</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white mb-4">
                    <div class="card-body">
                        <h5 class="card-title">活跃连接</h5>
                        <h2 class="mb-0" id="total-connections">--</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-info text-white mb-4">
                    <div class="card-body">
                        <h5 class="card-title">最后更新</h5>
                        <h6 class="mb-0" id="last-update">--</h6>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 热点图表 -->
            <div class="col-lg-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <strong>热门端口 TOP 5</strong>
                    </div>
                    <div class="card-body">
                        <canvas id="port-chart" height="200"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <strong>热门 IP TOP 5</strong>
                    </div>
                    <div class="card-body">
                        <canvas id="ip-chart" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 监听端口列表 -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong>监听端口列表</strong>
                <span class="badge bg-secondary" id="ports-count">0</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th>端口</th>
                                <th>类型</th>
                                <th>进程名称</th>
                                <th>当前连接</th>
                            </tr>
                        </thead>
                        <tbody id="ports-table">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 最新连接列表 -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong>最新活跃连接</strong>
                <span class="badge bg-secondary" id="connections-count">0</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th>本地端口</th>
                                <th>远程 IP</th>
                                <th>远程端口</th>
                            </tr>
                        </thead>
                        <tbody id="connections-table">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 mb-3 text-center text-muted">
        <small>Network Session Monitor v1.0.0 · Cross-platform</small>
    </footer>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script>
        // 刷新间隔（单位毫秒）
        const REFRESH_INTERVAL = 5000;

        let portChart = null;
        let ipChart = null;

        // 初始化图表
        function initCharts() {
            const portCtx = document.getElementById('port-chart').getContext('2d');
            portChart = new Chart(portCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '连接数',
                        data: [],
                        backgroundColor: 'rgba(0, 123, 255, 0.7)'
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            const ipCtx = document.getElementById('ip-chart').getContext('2d');
            ipChart = new Chart(ipCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '连接数',
                        data: [],
                        backgroundColor: 'rgba(40, 167, 69, 0.7)'
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // 更新统计卡片
        function updateStats(stats) {
            document.getElementById('total-ports').textContent = stats.total_listen_ports;
            document.getElementById('total-connections').textContent = stats.total_active_connections;
            document.getElementById('last-update').textContent = new Date().toLocaleString();
        }

        // 更新图表
        function updateCharts(topPorts, topIps) {
            portChart.data.labels = topPorts.map(p => `端口 ${p.port}`);
            portChart.data.datasets[0].data = topPorts.map(p => p.count);
            portChart.update();

            ipChart.data.labels = topIps.map(ip => ip.ip);
            ipChart.data.datasets[0].data = topIps.map(ip => ip.count);
            ipChart.update();
        }

        // 更新端口表格
        function updatePortsTable(ports) {
            const tbody = document.getElementById('ports-table');
            document.getElementById('ports-count').textContent = ports.length;
            tbody.innerHTML = '';
            
            ports.sort((a, b) => a.port - b.port);
            ports.forEach(port => {
                const tr = document.createElement('tr');
                const badgeClass = port.type === 'system' ? 'bg-secondary' : 'bg-primary';
                tr.innerHTML = `
                    <td><strong>${port.port}</strong></td>
                    <td><span class="badge ${badgeClass}">${port.type}</span></td>
                    <td>${port.process_name || '-'}</td>
                    <td>${port.connections}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 更新连接表格
        function updateConnectionsTable(connections) {
            const tbody = document.getElementById('connections-table');
            document.getElementById('connections-count').textContent = connections.total;
            tbody.innerHTML = '';
            
            connections.data.slice(-10).reverse().forEach(conn => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${conn.local_port}</td>
                    <td><code>${conn.remote_ip}</code></td>
                    <td>${conn.remote_port}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 拉取数据
        async function fetchData() {
            try {
                // 获取top数据
                const topResp = await fetch('/api/top?count=5');
                const topData = await topResp.json();
                
                updateStats(topData.stats);
                updateCharts(topData.top_ports, topData.top_ips);

                // 获取端口列表
                const portsResp = await fetch('/api/ports');
                const portsData = await portsResp.json();
                updatePortsTable(portsData);

                // 获取最新连接
                const connResp = await fetch('/api/connections?page=1&size=10');
                const connData = await connResp.json();
                updateConnectionsTable(connData);
            } catch (e) {
                console.error('拉取数据失败:', e);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            fetchData();
            setInterval(fetchData, REFRESH_INTERVAL);
        });
    </script>
</body>
</html>
